<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirecting… | SEO With Faiz</title>
  <script src="./assets/js/canonical-redirect.js"></script>
  <script>
    (function () {
      var base = 'https://seowithfaiz.com';
      var path = location.pathname.replace(/^\/Mohd-Faizuddin-Ahmed/, '') || '/';
      if (path.charAt(0) !== '/') path = '/' + path;
      location.replace(base + path + location.search + location.hash);
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=https://seowithfaiz.com/">
</head>
<body>
  <p>Redirecting to <a href="https://seowithfaiz.com/">seowithfaiz.com</a>…</p>
</body>
