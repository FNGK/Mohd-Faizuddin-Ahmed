<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Thanks for your message. Mohd Faizuddin Ahmed will reply shortly.">
  <meta name="robots" content="noindex">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LQZ72RK5LM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LQZ72RK5LM');

  <style>
    :root{
      --bg:#f7f6f2;
      --surface:#f9f8f5;
      --text:#26231d;
      --muted:#5e5b55;
      --primary:#01696f;
      --primary-hover:#0c4e54;
      --border:#d2cec6;
      --radius:14px;
      --shadow:0 10px 28px rgba(22,19,12,.1);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:1rem;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }
    .card{
      width:min(680px,100%);
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:clamp(1.2rem,2.8vw,2rem);
    }
    h1{
      margin:.1rem 0 .5rem;
      font-size:clamp(1.45rem,2.4vw,2rem);
      line-height:1.2;
    }
    p{margin:.35rem 0;color:var(--muted)}
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:.6rem;
      margin-top:1.1rem;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 1rem;
      border-radius:999px;
      border:1px solid transparent;
      font-weight:700;
      text-decoration:none;
      transition:background .18s ease,color .18s ease,border-color .18s ease,transform .15s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-hover)}
    .btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}
    .btn-secondary:hover{background:#ece9e4}
  </style>
</head>
<body>
  <main class="card" aria-labelledby="thanks-heading">
    <p>Message received</p>
    <h1 id="thanks-heading">Thank you for your query.</h1>
    <p>I have received your message and will get back to you shortly at the email address you provided.</p>
    <p>For urgent requests, you can also reach me directly on WhatsApp.</p>
    <div class="actions">
      <a class="btn btn-primary" href="https://wa.me/916281367104" target="_blank" rel="noopener noreferrer">WhatsApp</a>
      <a class="btn btn-secondary" href="./index.html#contact">Back to portfolio</a>
    </div>
  </main>
</body>
</html>
